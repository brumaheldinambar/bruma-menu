// Modo dual: dentro de Claude Cowork usa el conector MCP; en navegador
// normal usa la API REST de Airtable con un token personal guardado en
// localStorage (cada usuario aporta el suyo — nunca va en el código).
const hasCowork=()=>!!(window.cowork&&window.cowork.callMcpTool);
const TOKEN_KEY='bruma_airtable_token';
const getToken=()=>localStorage.getItem(TOKEN_KEY)||'';
async function rest(method,path,body){
  const r=await fetch('https://api.airtable.com/v0/'+path,{method,headers:{'Authorization':'Bearer '+getToken(),'Content-Type':'application/json'},body:body?JSON.stringify(body):undefined});
  if(r.status===401||r.status===403){localStorage.removeItem(TOKEN_KEY);S.needToken=true;throw new Error('Token de Airtable inválido o sin permisos sobre la base');}
  if(!r.ok){let m='Airtable · error '+r.status;try{const j=await r.json();m=j.error?.message||j.error?.type||m;}catch(e){}throw new Error(m);}
  return r.json();
}
const mcp=async(tool,args)=>{
  if(hasCowork()){
    const r=await window.cowork.callMcpTool(`${AT.MCP}__${tool}`,args);
    if(r.isError) throw new Error(r.content?.[0]?.text||'Airtable error');
    return r.structuredContent??JSON.parse(r.content[0].text);
  }
  if(tool==='list_records_for_table'){
    let records=[],offset;
    do{
      const q=new URLSearchParams({returnFieldsByFieldId:'true'});
      if(offset)q.set('offset',offset);
      const res=await rest('GET',`${args.baseId}/${args.tableId}?`+q.toString());
      records=records.concat(res.records||[]);offset=res.offset;
    }while(offset);
    return {records};
  }
  if(tool==='create_records_for_table')return rest('POST',`${args.baseId}/${args.tableId}`,{records:args.records,typecast:true});
  if(tool==='update_records_for_table')return rest('PATCH',`${args.baseId}/${args.tableId}`,{records:args.records,typecast:true});
  if(tool==='delete_records_for_table')return rest('DELETE',`${args.baseId}/${args.tableId}?`+args.recordIds.map(id=>'records[]='+encodeURIComponent(id)).join('&'));
  throw new Error('Operación desconocida: '+tool);
};

  const f=r.cellValuesByFieldId||r.fields||{};
  return {_recId:r.id,id:r.id,name:f[AT.M.name]||'',tipo:selVal(f[AT.M.tipo])||'botánico',perfil:selVal(f[AT.M.perfil])||'fresco',nivel:selVal(f[AT.M.nivel])||'halo',description:f[AT.M.description]||'',ingredientes:(f[AT.M.ingredientes]||'').split('\n').filter(Boolean),tecnica:multiVal(f[AT.M.tecnica]),garnish:f[AT.M.garnish]||'',cristaleria:selVal(f[AT.M.cristaleria])||'',puntuacion:f[AT.M.puntuacion]||0,notas:f[AT.M.notas]||''};
}
function cocktailFields(d){return {[AT.C.name]:d.name,[AT.C.type]:d.type,[AT.C.licor]:d.licor||[],[AT.C.nivel]:d.nivel,[AT.C.description]:d.description,[AT.C.ingredientes]:d.ingredientes.join('\n'),[AT.C.tecnica]:d.tecnica||[],[AT.C.garnish]:d.garnish,[AT.C.cristaleria]:d.cristaleria,[AT.C.puntuacion]:d.puntuacion||null,[AT.C.notas]:d.notas||''};}
function mocktailFields(d){return {[AT.M.name]:d.name,[AT.M.tipo]:d.tipo,[AT.M.perfil]:d.perfil,[AT.M.nivel]:d.nivel,[AT.M.description]:d.description,[AT.M.ingredientes]:d.ingredientes.join('\n'),[AT.M.tecnica]:d.tecnica||[],[AT.M.garnish]:d.garnish,[AT.M.cristaleria]:d.cristaleria,[AT.M.puntuacion]:d.puntuacion||null,[AT.M.notas]:d.notas||''};}

// ─── STATE ────────────────────────────────────────────────
const S={
  tab:'cocktails', cocktails:[], mocktails:[],
  fTipo:'todos', fLicor:[], fNivel:'todos',
  fMTipo:'todos', fMPerf:'todos', fMNivel:'todos',
  showAddC:false, showAddM:false, editing:null, confirmDel:null,
  expanded:{}, form:null, loading:true, saving:false,
  pendingNotes:{}, _toastTimer:null, needToken:false
};

// ─── TOAST ────────────────────────────────────────────────
function showToast(msg,isError=false){
  if(S._toastTimer)clearTimeout(S._toastTimer);
  let el=document.getElementById('bruma-toast');
  if(!el){el=document.createElement('div');el.id='bruma-toast';document.body.appendChild(el);}
  el.innerHTML=`<div style="background:${isError?C.deleteBg:C.surface};border:1px solid ${isError?'#DCA086':C.ambar+'55'};border-radius:8px;padding:10px 18px;font-size:12px;color:${isError?C.deleteFg:C.ambar};font-family:${font};letter-spacing:0.1em;position:fixed;bottom:24px;right:24px;z-index:600;animation:pop 0.3s ease">${msg}</div>`;
  S._toastTimer=setTimeout(()=>{el.innerHTML='';},2800);
}

// ─── HTML ESCAPE ──────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

// ─── FILTERS ─────────────────────────────────────────────
function filteredC(){
  return S.cocktails.filter(ct=>{
    if(S.fTipo!=='todos'&&ct.type!==S.fTipo)return false;
    if(S.fNivel!=='todos'&&ct.nivel!==S.fNivel)return false;
    if(S.fLicor.length&&!S.fLicor.some(l=>(ct.licor||[]).includes(l)))return false;
    return true;
  });
}
function filteredM(){
  return S.mocktails.filter(m=>{
    if(S.fMTipo!=='todos'&&m.tipo!==S.fMTipo)return false;
    if(S.fMPerf!=='todos'&&m.perfil!==S.fMPerf)return false;
    if(S.fMNivel!=='todos'&&m.nivel!==S.fMNivel)return false;
    return true;
  });
}

// ─── SHARED STYLES ───────────────────────────────────────
const iSt=`background:${C.surface};border:1px solid ${C.border};border-radius:6px;color:${C.crema};padding:10px 13px;font-size:15px;font-family:${font};width:100%;box-sizing:border-box;outline:none`;
const lSt=`font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:${C.ambar};font-weight:700;margin-bottom:5px;display:block`;

// ─── FILTER ROWS ─────────────────────────────────────────
// Radio filter (single select + Todos)
function radioRow(label,color,tags,labels,active,key){
  const fg=color==='amber'?C.ambar:C.verde;
  const allT=['todos',...tags];
  const allL=['Todos',...(labels||tags.map(t=>t.charAt(0).toUpperCase()+t.slice(1)))];
  const btns=allT.map((t,i)=>{
    const isA=active===t;
    const bg=isA?(color==='amber'?C.ambarBg:C.halobg):'transparent';
    const col=isA?fg:C.cremaMid;
    const bdr=isA?fg:C.border;
    return `<button onclick="setFilter('${key}','${esc(t)}')" style="padding:6px 14px;border-radius:999px;border:1.5px solid ${bdr};background:${bg};color:${col};font-size:12px;letter-spacing:0.08em;text-transform:uppercase;font-weight:${isA?700:400};min-height:36px;transition:all 0.18s">${esc(allL[i])}</button>`;
  }).join('');
  return `<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px"><span style="font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:${fg};font-weight:700;min-width:68px">${label}</span><div style="display:flex;gap:6px;flex-wrap:wrap">${btns}</div></div>`;
}
// Multi-select filter (checkboxes)
function filterRow(label,color,tags,labels,active,key){
  const fg=color==='amber'?C.ambar:C.verde;
  const btns=tags.map((t,i)=>tagBtn(labels?labels[i]:t.charAt(0).toUpperCase()+t.slice(1),active.includes(t),color,`toggleFilter('${key}','${esc(t)}')`)).join('');
  return `<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px"><span style="font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:${fg};font-weight:700;min-width:68px">${label}</span><div style="display:flex;gap:6px;flex-wrap:wrap">${btns}</div></div>`;
}
function tagBtn(label,active,color,onclick){const fg=color==='amber'?C.ambar:C.verde;return `<button onclick="${onclick}" style="padding:6px 14px;border-radius:999px;border:1.5px solid ${active?fg:C.border};background:${active?(color==='amber'?C.ambarBg:C.halobg):'transparent'};color:${active?fg:C.cremaMid};font-size:12px;letter-spacing:0.08em;text-transform:uppercase;font-weight:${active?700:400};min-height:36px;transition:all 0.18s">${esc(label)}</button>`;}
function setFilter(key,val){S[key]=val;renderApp();}

// ─── BADGE & TAG ─────────────────────────────────────────
function nivelBadge(nivel){const m=nivelMeta(nivel);return `<span title="${esc(m.desc)}" style="font-size:10px;letter-spacing:0.12em;text-transform:uppercase;font-weight:700;background:${m.bg};color:${m.fg};border:1px solid ${m.fg}33;border-radius:4px;padding:2px 8px;white-space:nowrap">${m.label}</span>`;}

// ─── STAR RATING ─────────────────────────────────────────
function buildStarsHTML(id,isMocktail,rating){
  return Array.from({length:5},(_,i)=>{
    const filled=i<(rating||0);
    return `<button onclick="event.stopPropagation();rateD('${esc(id)}',${isMocktail},${i+1})" title="${i+1} estrella${i>0?'s':''}" style="background:none;border:none;padding:1px 2px;font-size:20px;color:${filled?C.ambarSolid:'#ECDCC6'};cursor:pointer;line-height:1;transition:color 0.15s">★</button>`;
  }).join('');
}
async function rateD(id,isMocktail,newRating){
  const arr=isMocktail?S.mocktails:S.cocktails;
  const drink=arr.find(d=>d.id===id);
  if(!drink)return;
  const rating=drink.puntuacion===newRating?0:newRating;
  drink.puntuacion=rating;
  const el=document.getElementById(`stars-${id}`);
  if(el)el.innerHTML=buildStarsHTML(id,isMocktail,rating);
  try{
    const tbl=isMocktail?AT.MT:AT.CT;
    const fld=isMocktail?AT.M.puntuacion:AT.C.puntuacion;
    await mcp('update_records_for_table',{baseId:AT.base,tableId:tbl,records:[{id:drink._recId,fields:{[fld]:rating||null}}]});
    showToast(rating?`✦ ${rating}★`:'Puntuación eliminada');
  }catch(err){showToast('Error: '+err.message,true);}
}

// ─── NOTES ────────────────────────────────────────────────
async function saveNotes(id,isMocktail){
  const arr=isMocktail?S.mocktails:S.cocktails;
  const drink=arr.find(d=>d.id===id);
  if(!drink)return;
  const text=S.pendingNotes[id]!==undefined?S.pendingNotes[id]:drink.notas;
  const btn=document.getElementById(`notes-btn-${id}`);
  if(btn){btn.textContent='Guardando…';btn.disabled=true;}
  try{
    const tbl=isMocktail?AT.MT:AT.CT;
    const fld=isMocktail?AT.M.notas:AT.C.notas;
    await mcp('update_records_for_table',{baseId:AT.base,tableId:tbl,records:[{id:drink._recId,fields:{[fld]:text}}]});
    drink.notas=text;
    delete S.pendingNotes[id];
    if(btn){btn.textContent='Guardar nota';btn.disabled=false;}
    showToast('✦ Nota guardada');
  }catch(err){
    if(btn){btn.textContent='Guardar nota';btn.disabled=false;}
    showToast('Error: '+err.message,true);
  }
}

function buildMultiSelect(field,options,selected,placeholder){
  const display=selected.length?selected.join(' · '):placeholder;

    </div>
    <div style="display:flex;gap:10px;margin-top:22px">
      <button onclick="saveForm(${isMocktail})" ${S.saving?'disabled':''} style="background:${C.ambarSolid};color:${C.crema};border:none;border-radius:6px;padding:13px 26px;font-size:14px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;min-height:48px;opacity:${S.saving?.6:1}">${saveLbl}</button>
      <button onclick="cancelForm()" ${S.saving?'disabled':''} style="background:transparent;color:${C.cremaMid};border:1px solid ${C.border};border-radius:6px;padding:13px 22px;font-size:14px;min-height:48px">Cancelar</button>
    </div>
  </div>`;
}

// ─── MODALS ───────────────────────────────────────────────
function buildConfirmModal(){
  const d=S.confirmDel;
  const delLbl=S.saving?`<span style="display:inline-flex;align-items:center;gap:6px"><span style="width:12px;height:12px;border:2px solid ${C.deleteFg};border-top-color:transparent;border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block"></span>Eliminando…</span>`:'Eliminar';
  return `<div role="dialog" aria-modal="true" style="position:fixed;inset:0;background:rgba(12,28,23,.45);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;animation:fadeIn 0.18s ease">
    <div style="background:${C.surface};border:1px solid ${C.border};border-radius:12px;padding:40px 32px;max-width:360px;width:90%;text-align:center">
      <div style="width:28px;height:1px;background:${C.ambar};margin:0 auto 20px"></div>
      <p style="font-family:${fontT};color:${C.crema};font-size:18px;margin:0 0 10px">¿Eliminar &ldquo;${esc(d.name)}&rdquo;?</p>
      <p style="color:${C.cremaMid};font-size:15px;margin:0 0 28px;line-height:1.6">Esta acción no se puede deshacer.</p>
      <div style="display:flex;gap:12px;justify-content:center">
        <button onclick="S.confirmDel=null;renderApp()" ${S.saving?'disabled':''} style="background:transparent;border:1px solid ${C.border};border-radius:6px;color:${C.cremaMid};padding:12px 22px;font-size:14px;min-height:44px">Cancelar</button>
        <button onclick="confirmDelete()" ${S.saving?'disabled':''} style="background:${C.deleteBg};border:1px solid #DCA086;border-radius:6px;color:${C.deleteFg};padding:12px 22px;font-size:14px;font-weight:700;min-height:44px">${delLbl}</button>
      </div>
    </div>
  </div>`;
}
function buildEditModal(){
  return `<div role="dialog" aria-modal="true" style="position:fixed;inset:0;background:rgba(12,28,23,.45);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px;animation:fadeIn 0.18s ease"><div style="width:100%;max-width:580px;max-height:92vh;overflow-y:auto">${buildForm(S.editing.isMocktail,true)}</div></div>`;
}

// ─── TAB CONTENT ─────────────────────────────────────────
function buildCocktailsTab(){
  const drinks=filteredC();
  return `<div style="animation:fadeIn 0.3s ease">
    <div style="padding:20px 0 18px;border-bottom:1px solid ${C.border}">
      ${radioRow('Estilo','amber',tipoTags,['De autor','Clásico'],S.fTipo,'fTipo')}
      ${filterRow('Licor','green',licorTags,null,S.fLicor,'fLicor')}
      ${radioRow('Nivel','amber',nivelTags,NIVELES.map(n=>n.label),S.fNivel,'fNivel')}
    </div>
    ${S.showAddC?`<div style="padding-top:22px">${buildForm(false,false)}</div>`:''}
    <div>${S.cocktails.length===0?'':drinks.length===0?`<p style="padding:52px 0;text-align:center;color:${C.cremaMid};font-size:16px">Sin resultados para los filtros seleccionados.</p>`:drinks.map(ct=>drinkCard(ct,false)).join('')}</div>
    ${!S.showAddC?`<button onclick="openAddForm(false)" style="margin-top:30px;background:transparent;border:1px dashed ${C.ambar}44;border-radius:8px;color:${C.ambar};padding:15px 24px;width:100%;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;min-height:52px">+ Agregar cóctel</button>`:''}
  </div>`;
}
function buildMocktailsTab(){
  const drinks=filteredM();
  return `<div style="animation:fadeIn 0.3s ease">
    <div style="padding:20px 0 18px;border-bottom:1px solid ${C.border}">
      ${radioRow('Categoría','amber',mTipoTags,null,S.fMTipo,'fMTipo')}
      ${filterRow('Perfil','green',mPerfilTags,null,S.fMPerf,'fMPerf')}
      ${radioRow('Nivel','amber',nivelTags,NIVELES.map(n=>n.label),S.fMNivel,'fMNivel')}
    </div>
    ${S.showAddM?`<div style="padding-top:22px">${buildForm(true,false)}</div>`:''}
    <div>${S.mocktails.length===0?'':drinks.length===0?`<p style="padding:52px 0;text-align:center;color:${C.cremaMid};font-size:16px">Sin resultados para los filtros seleccionados.</p>`:drinks.map(m=>drinkCard(m,true)).join('')}</div>
    ${!S.showAddM?`<button onclick="openAddForm(true)" style="margin-top:30px;background:transparent;border:1px dashed ${C.verde}44;border-radius:8px;color:${C.verde};padding:15px 24px;width:100%;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;min-height:52px">+ Agregar mocktail</button>`:''}
  </div>`;
}

// ─── TOKEN GATE (solo modo navegador, sin Cowork) ─────────
function buildTokenGate(){
  return `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px">
    <div style="width:64px;margin-bottom:8px">${BRUMI_SVG}</div>
    <h1 style="font-family:${fontT};font-size:44px;color:${C.crema};letter-spacing:0.06em;font-weight:400;margin-bottom:6px">BRUMA</h1>
    <p style="font-size:11px;letter-spacing:0.28em;text-transform:uppercase;color:${C.ambar};margin-bottom:34px;font-weight:600">Menú de Experiencias Líquidas</p>
    <div style="background:${C.surface};border:1px solid ${C.border};border-radius:10px;padding:30px;max-width:460px;width:100%">
      <p style="font-family:${fontT};font-size:19px;color:${C.crema};margin-bottom:10px">Conecta tu Airtable</p>
      <p style="font-size:14px;color:${C.cremaMid};line-height:1.65;margin-bottom:18px">Pega tu token personal de Airtable. Se guarda solo en este navegador y te da acceso al menú según tus permisos en la base.</p>
      <label for="gate-token" style="${lSt}">Token personal</label>
      <input id="gate-token" type="password" style="${iSt};margin-bottom:14px" placeholder="pat…" onkeydown="if(event.key==='Enter')saveToken()"/>
      <button onclick="saveToken()" style="background:${C.ambarSolid};color:${C.crema};border:none;border-radius:6px;padding:13px 26px;font-size:14px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;min-height:48px;width:100%">Entrar</button>
      <p style="font-size:13px;color:${C.cremaMid};line-height:1.65;margin-top:18px;padding-top:16px;border-top:1px solid ${C.border}">¿No tienes token? Créalo en <strong>airtable.com/create/tokens</strong> con los permisos <em>data.records:read</em> y <em>data.records:write</em> sobre la base del menú.</p>
    </div>
  </div>`;
}
function saveToken(){
  const v=(document.getElementById('gate-token')?.value||'').trim();
  if(!v){showToast('Pega tu token de Airtable',true);return;}
  localStorage.setItem(TOKEN_KEY,v);
  S.needToken=false;
  loadFromAirtable();
}
function clearToken(){localStorage.removeItem(TOKEN_KEY);S.needToken=true;S.cocktails=[];S.mocktails=[];renderApp();}

// ─── RENDER ───────────────────────────────────────────────
function renderApp(){
  if(S.needToken&&!hasCowork()){document.getElementById('app').innerHTML=buildTokenGate();return;}
  const divider=`<div style="display:flex;align-items:center;justify-content:center;gap:14px;margin-top:28px"><div style="height:1px;width:50px;background:linear-gradient(to right,transparent,${C.ambar}66)"></div><div style="width:4px;height:4px;border-radius:50%;background:${C.ambar};opacity:.7"></div><div style="height:1px;width:50px;background:linear-gradient(to left,transparent,${C.ambar}66)"></div></div>`;
  if(S.loading){
    document.getElementById('app').innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px">
      <div style="width:64px">${BRUMI_SVG}</div>
      <h1 style="font-family:${fontT};font-size:52px;color:${C.crema};letter-spacing:0.06em;font-weight:400">BRUMA</h1>
      <div style="width:28px;height:28px;border:2px solid ${C.ambar}44;border-top-color:${C.ambar};border-radius:50%;animation:spin 0.8s linear infinite"></div>
      <p style="font-size:12px;letter-spacing:0.2em;text-transform:uppercase;color:${C.cremaMid}">Cargando menú…</p>
    </div>`;
    return;
  }
  const header=`<header style="text-align:center;padding:52px 24px 36px;border-bottom:1px solid ${C.border}">
    <div style="display:flex;justify-content:center;margin-bottom:18px"><div style="width:78px">${BRUMI_SVG}</div></div>
    <p style="font-size:11px;letter-spacing:0.28em;text-transform:uppercase;color:${C.ambar};margin-bottom:16px;font-weight:600">Menú de Experiencias Líquidas</p>
    <h1 style="font-family:${fontT};font-size:clamp(44px,9vw,76px);color:${C.crema};letter-spacing:0.06em;font-weight:400;line-height:1">BRUMA</h1>
    ${divider}
    <button onclick="loadFromAirtable()" title="Recargar desde Airtable" style="margin-top:20px;background:transparent;border:1px solid ${C.ambar}44;border-radius:6px;color:${C.ambar};padding:8px 18px;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;min-height:36px">↺ Recargar</button>
  </header>`;
  const tabs=`<nav style="display:flex;justify-content:center;border-bottom:1px solid ${C.border};max-width:880px;margin:0 auto">
    ${[{key:'cocktails',label:'Cócteles',count:S.cocktails.length},{key:'mocktails',label:'Mocktails',count:S.mocktails.length}].map(t=>`<button onclick="switchTab('${t.key}')" role="tab" aria-selected="${S.tab===t.key}" style="background:none;border:none;border-bottom:${S.tab===t.key?`2px solid ${C.ambar}`:'2px solid transparent'};color:${S.tab===t.key?C.crema:C.cremaMid};padding:20px 36px;font-size:13px;font-weight:${S.tab===t.key?700:400};letter-spacing:0.14em;text-transform:uppercase;transition:all 0.2s;margin-bottom:-1px;min-height:60px">${t.label}<span style="margin-left:8px;font-size:11px;color:${S.tab===t.key?C.ambar:C.cremaMid+'66'};font-weight:400">${t.count}</span></button>`).join('')}
  </nav>`;
  const main=`<main style="max-width:880px;margin:0 auto;padding:0 24px">${S.tab==='cocktails'?buildCocktailsTab():buildMocktailsTab()}</main>`;
  const footer=`<footer style="max-width:880px;margin:72px auto 0;padding:0 24px"><div style="border-top:1px solid ${C.border};padding-top:30px;text-align:center"><div style="display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:14px"><div style="height:1px;width:36px;background:linear-gradient(to right,transparent,${C.ambar}55)"></div><div style="width:3px;height:3px;border-radius:50%;background:${C.ambar};opacity:.5"></div><div style="height:1px;width:36px;background:linear-gradient(to left,transparent,${C.ambar}55)"></div></div><p style="font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:${C.cremaMid};margin-bottom:24px">Bruma · Coctelería · Mocktails · Experiencias</p>${!hasCowork()?`<button onclick="clearToken()" style="background:transparent;border:none;color:${C.cremaMid};font-size:11px;letter-spacing:0.1em;text-transform:uppercase;text-decoration:underline;margin-bottom:20px">Cambiar token de Airtable</button>`:''}<div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;padding-top:20px;border-top:1px solid ${C.border}">${NIVELES.map(n=>`<div style="display:flex;align-items:center;gap:8px">${nivelBadge(n.value)}<span style="font-size:12px;color:${C.cremaMid}">${esc(n.desc)}</span></div>`).join('')}</div></div></footer>`;
  document.getElementById('app').innerHTML=header+tabs+main+footer+(S.editing?buildEditModal():'')+(S.confirmDel?buildConfirmModal():'');
}

// ─── ACTIONS ─────────────────────────────────────────────
function switchTab(tab){S.tab=tab;renderApp();}
function toggleFilter(key,val){const arr=S[key];const idx=arr.indexOf(val);if(idx>=0)arr.splice(idx,1);else arr.push(val);renderApp();}
function toggleCard(id){S.expanded[id]=!S.expanded[id];const d=document.getElementById(`card-detail-${id}`);const ic=document.getElementById(`card-icon-${id}`);if(d)d.style.display=S.expanded[id]?'block':'none';if(ic)ic.style.transform=`rotate(${S.expanded[id]?45:0}deg)`;}

// ─── FORM ACTIONS ────────────────────────────────────────
function openAddForm(isMocktail){
  S.form={name:'',type:'autor',licor:[],tipo:'botánico',perfil:'fresco',nivel:'halo',description:'',ingredientes:'',tecnica:[],garnish:'',cristaleria:'',puntuacion:0,notas:''};
  if(isMocktail)S.showAddM=true;else S.showAddC=true;
  renderApp();
}
function openEdit(id,isMocktail){
  const drink=isMocktail?S.mocktails.find(m=>m.id===id):S.cocktails.find(c=>c.id===id);
  if(!drink)return;
  S.editing={id,isMocktail,_recId:drink._recId};
  S.form={name:drink.name||'',type:drink.type||'autor',licor:Array.isArray(drink.licor)?[...drink.licor]:[],tipo:drink.tipo||'botánico',perfil:drink.perfil||'fresco',nivel:drink.nivel||'halo',description:drink.description||'',ingredientes:Array.isArray(drink.ingredientes)?drink.ingredientes.join('\n'):(drink.ingredientes||''),tecnica:Array.isArray(drink.tecnica)?[...drink.tecnica]:[],garnish:drink.garnish||'',cristaleria:drink.cristaleria||'',puntuacion:drink.puntuacion||0,notas:drink.notas||''};
  renderApp();
}
function cancelForm(){S.form=null;S.editing=null;S.showAddC=false;S.showAddM=false;renderApp();}

async function saveForm(isMocktail){
  const f=S.form;
  if(!f||!f.name.trim()){showToast('El nombre es obligatorio',true);return;}
  const ings=(f.ingredientes||'').split('\n').filter(Boolean);
  const base={name:f.name.trim(),description:f.description||'',ingredientes:ings,tecnica:f.tecnica||[],garnish:f.garnish||'',cristaleria:f.cristaleria||'',nivel:f.nivel||'halo',puntuacion:f.puntuacion||0,notas:f.notas||''};
  S.saving=true;renderApp();
  try{
    if(S.editing){
      const item=isMocktail?{...base,tipo:f.tipo||'botánico',perfil:f.perfil||'fresco'}:{...base,type:f.type||'autor',licor:f.licor||[]};
      const tbl=isMocktail?AT.MT:AT.CT;
      const fields=isMocktail?mocktailFields(item):cocktailFields(item);
      await mcp('update_records_for_table',{baseId:AT.base,tableId:tbl,records:[{id:S.editing._recId,fields}]});
      item._recId=S.editing._recId;item.id=S.editing.id;
      if(isMocktail)S.mocktails=S.mocktails.map(m=>m.id===S.editing.id?item:m);
      else S.cocktails=S.cocktails.map(c=>c.id===S.editing.id?item:c);
      S.editing=null;
    }else{
      const item=isMocktail?{...base,tipo:f.tipo||'botánico',perfil:f.perfil||'fresco'}:{...base,type:f.type||'autor',licor:f.licor||[]};
      const tbl=isMocktail?AT.MT:AT.CT;
      const fields=isMocktail?mocktailFields(item):cocktailFields(item);
      const res=await mcp('create_records_for_table',{baseId:AT.base,tableId:tbl,typecast:true,records:[{fields}]});
      const recId=res.records[0].id;
      item._recId=recId;item.id=recId;
      if(isMocktail){S.mocktails=[...S.mocktails,item];S.showAddM=false;}
      else{S.cocktails=[...S.cocktails,item];S.showAddC=false;}
    }
    S.form=null;S.saving=false;renderApp();showToast('✦ Guardado en Airtable');
  }catch(err){S.saving=false;renderApp();showToast('Error: '+err.message,true);}
}

// ─── DELETE ──────────────────────────────────────────────
function openConfirmDel(id,name,isMocktail){S.confirmDel={id,name,isMocktail};renderApp();}
async function confirmDelete(){
  if(!S.confirmDel)return;
  const{id,isMocktail}=S.confirmDel;
  const drink=isMocktail?S.mocktails.find(m=>m.id===id):S.cocktails.find(c=>c.id===id);
  if(!drink)return;
  S.saving=true;renderApp();
  try{
    await mcp('delete_records_for_table',{baseId:AT.base,tableId:isMocktail?AT.MT:AT.CT,recordIds:[drink._recId]});
    if(isMocktail)S.mocktails=S.mocktails.filter(m=>m.id!==id);
    else S.cocktails=S.cocktails.filter(c=>c.id!==id);
    S.confirmDel=null;S.saving=false;renderApp();showToast('Eliminado');
  }catch(err){S.saving=false;renderApp();showToast('Error: '+err.message,true);}
}

// ─── DROPDOWN HELPERS ────────────────────────────────────
function toggleDD(event,id){event.stopPropagation();const p=document.getElementById(id+'-panel');if(!p)return;const open=p.style.display!=='none';document.querySelectorAll('.dd-panel').forEach(x=>x.style.display='none');if(!open)p.style.display='block';}
function selectMulti(event,field,val){
  event.stopPropagation();if(!S.form)return;
  const arr=Array.isArray(S.form[field])?[...S.form[field]]:[];
  const idx=arr.indexOf(val);if(idx>=0)arr.splice(idx,1);else arr.push(val);
  S.form[field]=arr;
  const disp=document.getElementById(`ddm-${field}-disp`);
  if(disp){disp.textContent=arr.length?arr.join(' · '):'Seleccionar…';disp.style.color=arr.length?C.crema:C.cremaMid;}
  const panel=document.getElementById(`ddm-${field}-panel`);
  if(panel){const opts=getMultiOptions(field);panel.innerHTML=opts.map(opt=>{const s=arr.includes(opt);return `<button type="button" onclick="selectMulti(event,'${field}','${esc(opt)}')" style="display:flex;align-items:center;gap:10px;width:100%;background:${s?C.surfaceAlt:'transparent'};border:none;border-bottom:1px solid ${C.border};color:${s?C.crema:C.cremaMid};padding:11px 13px;font-size:15px;font-family:${font};cursor:pointer;text-align:left"><span style="width:16px;height:16px;border:2px solid ${s?C.ambar:C.border};border-radius:3px;background:${s?C.ambar:'transparent'};display:inline-flex;align-items:center;justify-content:center;flex-shrink:0">${s?`<span style="color:${C.bg};font-size:10px;font-weight:900">✓</span>`:''}</span>${esc(opt)}</button>`;}).join('');}
}
function selectSingle(event,field,val){
  event.stopPropagation();if(!S.form)return;
  S.form[field]=val;
  const disp=document.getElementById(`dds-${field}-disp`);if(disp){disp.textContent=val;disp.style.color=C.crema;}
  const panel=document.getElementById(`dds-${field}-panel`);
  if(panel){const opts={cristaleria:CRISTALERIAS,type:['autor','clasico'],tipo:mTipoTags,perfil:mPerfilTags}[field]||[];panel.innerHTML=opts.map(opt=>`<button type="button" onclick="selectSingle(event,'${field}','${esc(opt)}')" style="display:block;width:100%;background:${val===opt?C.surfaceAlt:'transparent'};border:none;border-bottom:1px solid ${C.border};color:${val===opt?C.crema:C.cremaMid};padding:11px 13px;font-size:15px;font-family:${font};cursor:pointer;text-align:left">${esc(opt)}</button>`).join('');panel.style.display='none';}
}
function selectNivel(val){
  if(!S.form)return;S.form.nivel=val;
  NIVELES.forEach(n=>{const btn=document.getElementById(`nivel-btn-${n.value}`);if(!btn)return;const a=val===n.value;btn.style.border=`1.5px solid ${a?n.fg:C.border}`;btn.style.background=a?n.bg:'transparent';btn.style.color=a?n.fg:C.cremaMid;btn.style.fontWeight=a?'700':'400';});
  const d=document.getElementById('nivel-desc');if(d)d.textContent=nivelMeta(val).desc;
}
document.addEventListener('click',()=>document.querySelectorAll('.dd-panel').forEach(p=>p.style.display='none'));

// ─── LOAD FROM AIRTABLE ───────────────────────────────────
async function loadFromAirtable(){
  S.loading=true;renderApp();
  try{
    const[cRes,mRes]=await Promise.all([
      mcp('list_records_for_table',{baseId:AT.base,tableId:AT.CT}),
      mcp('list_records_for_table',{baseId:AT.base,tableId:AT.MT})
    ]);
    S.cocktails=(cRes.records||[]).map(parseCocktail).filter(d=>d.name);
    S.mocktails=(mRes.records||[]).map(parseMocktail).filter(d=>d.name);
  }catch(err){showToast('Error cargando Airtable: '+err.message,true);}
  S.loading=false;renderApp();
}

// ─── INIT ─────────────────────────────────────────────────
if(!hasCowork()&&!getToken()){S.loading=false;S.needToken=true;renderApp();}
else loadFromAirtable();
</script>
</body>
</html>
