// Modo dual: dentro de Claude Cowork usa el conector MCP; en navegador
// normal usa la API REST de Airtable con un token personal guardado en
// localStorage (cada usuario aporta el suyo — nunca va en el código).
const hasCowork=()=>!!(window.cowork&&window.cowork.callMcpTool);
const TOKEN_KEY='bruma_airtable_token';
const getToken=()=>localStorage.getItem(TOKEN_KEY)||'';
async function rest(method,path,body){
  const r=await fetch('https://api.airtable.com/v0/'+path,{method,headers:{'Authorization':'Bearer '+getToken(),'Content-Type':'application/json'},body:body?JSON.stringify(body):undefined});
  if(r.status===401||r.status===403){localStorage.removeItem(TOKEN_KEY);S.needToken=true;throw new Error('Token de Airtable inválido o sin permisos sobre la base');}
  if(!r.ok){let m='Airtable · error '+r.status;try{const j=await r.json();m=j.error?.message||j.error?.type||m;}catch(e){}throw new Error(m);}
  return r.json();
}
const mcp=async(tool,args)=>{
  if(hasCowork()){
    const r=await window.cowork.callMcpTool(`${AT.MCP}__${tool}`,args);
    if(r.isError) throw new Error(r.content?.[0]?.text||'Airtable error');
    return r.structuredContent??JSON.parse(r.content[0].text);
  }
  if(tool==='list_records_for_table'){
    let records=[],offset;
    do{
      const q=new URLSearchParams({returnFieldsByFieldId:'true'});
      if(offset)q.set('offset',offset);
      const res=await rest('GET',`${args.baseId}/${args.tableId}?`+q.toString());
      records=records.concat(res.records||[]);offset=res.offset;
    }while(offset);
    return {records};
  }
  if(tool==='create_records_for_table')return rest('POST',`${args.baseId}/${args.tableId}`,{records:args.records,typecast:true});
  if(tool==='update_records_for_table')return rest('PATCH',`${args.baseId}/${args.tableId}`,{records:args.records,typecast:true});
  if(tool==='delete_records_for_table')return rest('DELETE',`${args.baseId}/${args.tableId}?`+args.recordIds.map(id=>'records[]='+encodeURIComponent(id)).join('&'));
  throw new Error('Operación desconocida: '+tool);
};

    const col=isA?fg:C.cremaMid;
    const bdr=isA?fg:C.border;
    return `<button onclick="setFilter('${key}','${esc(t)}')" style="padding:6px 14px;border-radius:999px;border:1.5px solid ${bdr};background:${bg};color:${col};font-size:12px;letter-spacing:0.08em;text-transform:uppercase;font-weight:${isA?700:400};min-height:36px;transition:all 0.18s">${esc(allL[i])}</button>`;
  }).join('');
  return `<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px"><span style="font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:${fg};font-weight:700;min-width:68px">${label}</span><div style="display:flex;gap:6px;flex-wrap:wrap">${btns}</div></div>`;
}
// Multi-select filter (checkboxes)
function filterRow(label,color,tags,labels,active,key){
  const fg=color==='amber'?C.ambar:C.verde;
  const btns=tags.map((t,i)=>tagBtn(labels?labels[i]:t.charAt(0).toUpperCase()+t.slice(1),active.includes(t),color,`toggleFilter('${key}','${esc(t)}')`)).join('');
  return `<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px"><span style="font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:${fg};font-weight:700;min-width:68px">${label}</span><div style="display:flex;gap:6px;flex-wrap:wrap">${btns}</div></div>`;
}
function tagBtn(label,active,color,onclick){const fg=color==='amber'?C.ambar:C.verde;return `<button onclick="${onclick}" style="padding:6px 14px;border-radius:999px;border:1.5px solid ${active?fg:C.border};background:${active?(color==='amber'?C.ambarBg:C.halobg):'transparent'};color:${active?fg:C.cremaMid};font-size:12px;letter-spacing:0.08em;text-transform:uppercase;font-weight:${active?700:400};min-height:36px;transition:all 0.18s">${esc(label)}</button>`;}
function setFilter(key,val){S[key]=val;renderApp();}

// ─── BADGE & TAG ─────────────────────────────────────────
function nivelBadge(nivel){const m=nivelMeta(nivel);return `<span title="${esc(m.desc)}" style="font-size:10px;letter-spacing:0.12em;text-transform:uppercase;font-weight:700;background:${m.bg};color:${m.fg};border:1px solid ${m.fg}33;border-radius:4px;padding:2px 8px;white-space:nowrap">${m.label}</span>`;}

// ─── STAR RATING ─────────────────────────────────────────
function buildStarsHTML(id,isMocktail,rating){
  return Array.from({length:5},(_,i)=>{
    const filled=i<(rating||0);
    return `<button onclick="event.stopPropagation();rateD('${esc(id)}',${isMocktail},${i+1})" title="${i+1} estrella${i>0?'s':''}" style="background:none;border:none;padding:1px 2px;font-size:20px;color:${filled?C.ambarSolid:'#ECDCC6'};cursor:pointer;line-height:1;transition:color 0.15s">★</button>`;
  }).join('');
}
async function rateD(id,isMocktail,newRating){
  const arr=isMocktail?S.mocktails:S.cocktails;
  const drink=arr.find(d=>d.id===id);
  if(!drink)return;
  const rating=drink.puntuacion===newRating?0:newRating;
  drink.puntuacion=rating;
  const el=document.getElementById(`stars-${id}`);
  if(el)el.innerHTML=buildStarsHTML(id,isMocktail,rating);
  try{
    const tbl=isMocktail?AT.MT:AT.CT;
    const fld=isMocktail?AT.M.puntuacion:AT.C.puntuacion;
    await mcp('update_records_for_table',{baseId:AT.base,tableId:tbl,records:[{id:drink._recId,fields:{[fld]:rating||null}}]});
    showToast(rating?`✦ ${rating}★`:'Puntuación eliminada');
  }catch(err){showToast('Error: '+err.message,true);}
}

// ─── NOTES (bitácora: cada nota se agrega con fecha y firma) ──
function getFirma(){try{return localStorage.getItem('bruma_firma')||'';}catch(e){return '';}}
function setFirma(v){try{localStorage.setItem('bruma_firma',v);}catch(e){}}
async function saveNotes(id,isMocktail){
  const arr=isMocktail?S.mocktails:S.cocktails;
  const drink=arr.find(d=>d.id===id);
  if(!drink)return;
  const text=(S.pendingNotes[id]||'').trim();
  if(!text){showToast('Escribe la nota primero',true);return;}
  const firma=(document.getElementById(`firma-${id}`)?.value||'').trim();
  if(firma)setFirma(firma);
  const fecha=new Date().toLocaleString('es',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
  const entry=`◆ ${fecha}${firma?' · '+firma:''}\n${text}`;
  const nuevo=entry+(drink.notas?`\n\n${drink.notas}`:'');
  const btn=document.getElementById(`notes-btn-${id}`);
  if(btn){btn.textContent='Guardando…';btn.disabled=true;}
  try{
    const tbl=isMocktail?AT.MT:AT.CT;
    const fld=isMocktail?AT.M.notas:AT.C.notas;
    await mcp('update_records_for_table',{baseId:AT.base,tableId:tbl,records:[{id:drink._recId,fields:{[fld]:nuevo}}]});
    drink.notas=nuevo;
    delete S.pendingNotes[id];
    renderApp();
    showToast('✦ Nota agregada a la bitácora');
  }catch(err){
    if(btn){btn.textContent='+ Agregar nota';btn.disabled=false;}
    showToast('Error: '+err.message,true);
  }
}

// ─── COSTES · modelo (portado del módulo CostosProveedores) ──
const COSTM={overhead:0.15,mult:{halo:3.5,ambar:4.0,prueba:3.5},baseEst:{halo:8000,ambar:15000,prueba:8000}};
function volumeEff(n){if(n>=40)return .20;if(n>=25)return .14;if(n>=15)return .08;return 0;}
const fmtCOP=n=>new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',maximumFractionDigits:0}).format(Math.round(n||0));
const normTxt=s=>String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();

function parseInsumo(r){
  const f=r.cellValuesByFieldId||r.fields||{};
  const provRaw=f[AT.I.proveedor]||[];
  const provNames=(Array.isArray(provRaw)?provRaw:[provRaw]).map(p=>typeof p==='string'?(S.provMap[p]||''):(p?.name||S.provMap[p?.id]||'')).filter(Boolean);
  const precio=Number(f[AT.I.precio])||0;
  const cantidad=Number(f[AT.I.cantidad])||0;
  return {id:r.id,insumo:f[AT.I.insumo]||'',presentacion:f[AT.I.presentacion]||'',precio,cantidad,
    unidad:selVal(f[AT.I.unidad])||'ml',cpu:cantidad>0?precio/cantidad:0,
    proveedor:provNames.join(', '),url:f[AT.I.url]||'',fuente:selVal(f[AT.I.fuente])||'',fecha:f[AT.I.fecha]||''};
}

// "Gin botánico 50ml" → {name:'gin botanico', qty:50, unit:'ml', qml:50}
function parseIngLine(line){
  const m=String(line).match(/(\d+(?:[.,]\d+)?)\s*(ml|gr?|oz|uds?|un|u\b|dash(?:es)?|cdta|cda|gotas?)\b/i);
  let qty=null,unit=null,qml=null;
  if(m){
    qty=parseFloat(m[1].replace(',','.'));unit=m[2].toLowerCase();qml=qty;
    if(unit==='oz')qml=qty*30;else if(unit==='cda')qml=qty*15;else if(unit==='cdta')qml=qty*5;
    else if(unit.startsWith('dash'))qml=qty;else if(unit.startsWith('gota'))qml=qty*0.05;
  }
  const name=normTxt(String(line).replace(m?m[0]:'','').replace(/\s{2,}/g,' '));
  return {raw:String(line).trim(),name,qty,unit,qml};
}

function drinkCost(d){
  const eficiencia=volumeEff(S.costGroup);
  const items=[];let costoInsumos=0;let matched=0;
  for(const ln of (d.ingredientes||[])){
    const p=parseIngLine(ln);
    let ins=null;
    for(const i of S.insumos){
      const nn=normTxt(i.insumo);
      if(nn.length>=3&&(p.name.includes(nn)||nn.includes(p.name))){ins=i;break;}
    }
    if(ins&&ins.cpu>0){
      const q=ins.unidad==='un'?(p.qty||1):(p.qml||0);
      const c=ins.cpu*q;
      items.push({...p,ins,costo:c,ok:q>0});
      costoInsumos+=c;matched++;
    }else items.push({...p,ins:null,costo:0,ok:false});
  }
  const estimado=matched===0;
  if(estimado)costoInsumos=COSTM.baseEst[d.nivel]??COSTM.baseEst.halo;
  costoInsumos*=(1-eficiencia);
  const conOverhead=costoInsumos*(1+COSTM.overhead);
  const precioSugerido=conOverhead*(COSTM.mult[d.nivel]??COSTM.mult.halo);
  const margen=precioSugerido-conOverhead;
  return {items,estimado,matched,eficiencia,costoInsumos,conOverhead,precioSugerido,margen,
    margenPct:precioSugerido>0?margen/precioSugerido:0};
}

        <div id="cost-icon-${d.id}" style="font-size:18px;color:${C.ambar};transform:rotate(${exp?45:0}deg);transition:transform 0.25s;width:20px;text-align:center">+</div>

function switchTab(tab){S.tab=tab;renderApp();}
function toggleFilter(key,val){const arr=S[key];const idx=arr.indexOf(val);if(idx>=0)arr.splice(idx,1);else arr.push(val);renderApp();}
function toggleCard(id){S.expanded[id]=!S.expanded[id];const d=document.getElementById(`card-detail-${id}`);const ic=document.getElementById(`card-icon-${id}`);if(d)d.style.display=S.expanded[id]?'block':'none';if(ic)ic.style.transform=`rotate(${S.expanded[id]?45:0}deg)`;}

// ─── FORM ACTIONS ────────────────────────────────────────
function openAddForm(isMocktail){
  S.form={name:'',type:'autor',licor:[],tipo:'botánico',perfil:'fresco',nivel:'halo',description:'',ingredientes:'',tecnica:[],garnish:'',cristaleria:'',puntuacion:0,notas:''};
  if(isMocktail)S.showAddM=true;else S.showAddC=true;
  renderApp();
}
function openEdit(id,isMocktail){
  const drink=isMocktail?S.mocktails.find(m=>m.id===id):S.cocktails.find(c=>c.id===id);
  if(!drink)return;
  S.editing={id,isMocktail,_recId:drink._recId};
  S.form={name:drink.name||'',type:drink.type||'autor',licor:Array.isArray(drink.licor)?[...drink.licor]:[],tipo:drink.tipo||'botánico',perfil:drink.perfil||'fresco',nivel:drink.nivel||'halo',description:drink.description||'',ingredientes:Array.isArray(drink.ingredientes)?drink.ingredientes.join('\n'):(drink.ingredientes||''),tecnica:Array.isArray(drink.tecnica)?[...drink.tecnica]:[],garnish:drink.garnish||'',cristaleria:drink.cristaleria||'',puntuacion:drink.puntuacion||0,notas:drink.notas||''};
  renderApp();
}
function cancelForm(){S.form=null;S.editing=null;S.showAddC=false;S.showAddM=false;renderApp();}

async function saveForm(isMocktail){
  const f=S.form;
  if(!f||!f.name.trim()){showToast('El nombre es obligatorio',true);return;}
  const ings=(f.ingredientes||'').split('\n').filter(Boolean);
  const base={name:f.name.trim(),description:f.description||'',ingredientes:ings,tecnica:f.tecnica||[],garnish:f.garnish||'',cristaleria:f.cristaleria||'',nivel:f.nivel||'halo',puntuacion:f.puntuacion||0,notas:f.notas||''};
  S.saving=true;renderApp();
  try{
    if(S.editing){
      const item=isMocktail?{...base,tipo:f.tipo||'botánico',perfil:f.perfil||'fresco'}:{...base,type:f.type||'autor',licor:f.licor||[]};
      const tbl=isMocktail?AT.MT:AT.CT;
      const fields=isMocktail?mocktailFields(item):cocktailFields(item);
      await mcp('update_records_for_table',{baseId:AT.base,tableId:tbl,records:[{id:S.editing._recId,fields}]});
      item._recId=S.editing._recId;item.id=S.editing.id;
      if(isMocktail)S.mocktails=S.mocktails.map(m=>m.id===S.editing.id?item:m);
      else S.cocktails=S.cocktails.map(c=>c.id===S.editing.id?item:c);
      S.editing=null;
    }else{
      const item=isMocktail?{...base,tipo:f.tipo||'botánico',perfil:f.perfil||'fresco'}:{...base,type:f.type||'autor',licor:f.licor||[]};
      const tbl=isMocktail?AT.MT:AT.CT;
      const fields=isMocktail?mocktailFields(item):cocktailFields(item);
      const res=await mcp('create_records_for_table',{baseId:AT.base,tableId:tbl,typecast:true,records:[{fields}]});
      const recId=res.records[0].id;
      item._recId=recId;item.id=recId;
      if(isMocktail){S.mocktails=[...S.mocktails,item];S.showAddM=false;}
      else{S.cocktails=[...S.cocktails,item];S.showAddC=false;}
    }
    S.form=null;S.saving=false;renderApp();showToast('✦ Guardado en Airtable');
  }catch(err){S.saving=false;renderApp();showToast('Error: '+err.message,true);}
}

// ─── DELETE ──────────────────────────────────────────────
function openConfirmDel(id,name,isMocktail){S.confirmDel={id,name,isMocktail};renderApp();}
async function confirmDelete(){
  if(!S.confirmDel)return;
  const{id,isMocktail}=S.confirmDel;
  const drink=isMocktail?S.mocktails.find(m=>m.id===id):S.cocktails.find(c=>c.id===id);
  if(!drink)return;
  S.saving=true;renderApp();
  try{
    await mcp('delete_records_for_table',{baseId:AT.base,tableId:isMocktail?AT.MT:AT.CT,recordIds:[drink._recId]});
    if(isMocktail)S.mocktails=S.mocktails.filter(m=>m.id!==id);
    else S.cocktails=S.cocktails.filter(c=>c.id!==id);
    S.confirmDel=null;S.saving=false;renderApp();showToast('Eliminado');
  }catch(err){S.saving=false;renderApp();showToast('Error: '+err.message,true);}
}

// ─── DROPDOWN HELPERS ────────────────────────────────────
function toggleDD(event,id){event.stopPropagation();const p=document.getElementById(id+'-panel');if(!p)return;const open=p.style.display!=='none';document.querySelectorAll('.dd-panel').forEach(x=>x.style.display='none');if(!open)p.style.display='block';}
function selectMulti(event,field,val){
  event.stopPropagation();if(!S.form)return;
  const arr=Array.isArray(S.form[field])?[...S.form[field]]:[];
  const idx=arr.indexOf(val);if(idx>=0)arr.splice(idx,1);else arr.push(val);
  S.form[field]=arr;
  const disp=document.getElementById(`ddm-${field}-disp`);
  if(disp){disp.textContent=arr.length?arr.join(' · '):'Seleccionar…';disp.style.color=arr.length?C.crema:C.cremaMid;}
  const panel=document.getElementById(`ddm-${field}-panel`);
  if(panel){const opts=getMultiOptions(field);panel.innerHTML=opts.map(opt=>{const s=arr.includes(opt);return `<button type="button" onclick="selectMulti(event,'${field}','${esc(opt)}')" style="display:flex;align-items:center;gap:10px;width:100%;background:${s?C.surfaceAlt:'transparent'};border:none;border-bottom:1px solid ${C.border};color:${s?C.crema:C.cremaMid};padding:11px 13px;font-size:15px;font-family:${font};cursor:pointer;text-align:left"><span style="width:16px;height:16px;border:2px solid ${s?C.ambar:C.border};border-radius:3px;background:${s?C.ambar:'transparent'};display:inline-flex;align-items:center;justify-content:center;flex-shrink:0">${s?`<span style="color:${C.bg};font-size:10px;font-weight:900">✓</span>`:''}</span>${esc(opt)}</button>`;}).join('');}
}
function selectSingle(event,field,val){
  event.stopPropagation();if(!S.form)return;
  S.form[field]=val;
  const disp=document.getElementById(`dds-${field}-disp`);if(disp){disp.textContent=val;disp.style.color=C.crema;}
  const panel=document.getElementById(`dds-${field}-panel`);
  if(panel){const opts={cristaleria:CRISTALERIAS,type:['autor','clasico'],tipo:mTipoTags,perfil:mPerfilTags}[field]||[];panel.innerHTML=opts.map(opt=>`<button type="button" onclick="selectSingle(event,'${field}','${esc(opt)}')" style="display:block;width:100%;background:${val===opt?C.surfaceAlt:'transparent'};border:none;border-bottom:1px solid ${C.border};color:${val===opt?C.crema:C.cremaMid};padding:11px 13px;font-size:15px;font-family:${font};cursor:pointer;text-align:left">${esc(opt)}</button>`).join('');panel.style.display='none';}
}
function selectNivel(val){
  if(!S.form)return;S.form.nivel=val;
  NIVELES.forEach(n=>{const btn=document.getElementById(`nivel-btn-${n.value}`);if(!btn)return;const a=val===n.value;btn.style.border=`1.5px solid ${a?n.fg:C.border}`;btn.style.background=a?n.bg:'transparent';btn.style.color=a?n.fg:C.cremaMid;btn.style.fontWeight=a?'700':'400';});
  const d=document.getElementById('nivel-desc');if(d)d.textContent=nivelMeta(val).desc;
}
document.addEventListener('click',()=>document.querySelectorAll('.dd-panel').forEach(p=>p.style.display='none'));

// ─── LOAD FROM AIRTABLE ───────────────────────────────────
async function loadFromAirtable(){
  S.loading=true;renderApp();
  try{
    const[cRes,mRes]=await Promise.all([
      mcp('list_records_for_table',{baseId:AT.base,tableId:AT.CT}),
      mcp('list_records_for_table',{baseId:AT.base,tableId:AT.MT})
    ]);
    S.cocktails=(cRes.records||[]).map(parseCocktail).filter(d=>d.name);
    S.mocktails=(mRes.records||[]).map(parseMocktail).filter(d=>d.name);
  }catch(err){showToast('Error cargando Airtable: '+err.message,true);}
  try{
    const[iRes,pRes]=await Promise.all([
      mcp('list_records_for_table',{baseId:AT.base,tableId:AT.IT}),
      mcp('list_records_for_table',{baseId:AT.base,tableId:AT.PT})
    ]);
    S.provMap={};
    (pRes.records||[]).forEach(r=>{const f=r.cellValuesByFieldId||r.fields||{};S.provMap[r.id]=f[AT.P.name]||'';});
    S.insumos=(iRes.records||[]).map(parseInsumo).filter(i=>i.insumo);
    S.costesOk=true;
  }catch(err){S.costesOk=false;S.insumos=[];}
  S.loading=false;renderApp();
}

// ─── INIT ─────────────────────────────────────────────────
if(!hasCowork()&&!getToken()){S.loading=false;S.needToken=true;renderApp();}
else loadFromAirtable();
</script>
